email_analyzer_task:
  description: >
    You are given an {email_input} email body.

    Extract the following details:
    - Company Name
    - Invoice Date
    - Invoice Amount
    - Invoice Number

    If any value is missing, return it as an empty string.

    Return ONLY valid JSON. Do not add any explanation.

  expected_output: >
    {
      "Company Name": "",
      "Invoice Date": "",
      "Invoice Amount": "",
      "Invoice Number": ""
    }

  agent: email_analyzer


pdf_generator_task:
  description: >
    Take the JSON output from the previous task.

    You MUST call the tool "Generate Invoice PDF".

    Pass EXACTLY these fields:
    - Company Name
    - Invoice Date
    - Invoice Amount
    - Invoice Number

    Do not rename fields.
    Do not explain anything.
    Only return the tool output.

  expected_output: >
    {
      "status": "success",
      "file_name": "INV-001.pdf",
      "file_content": "base64string",
      "message": "PDF generated and encoded successfully"
    }

  context: [email_analyzer_task]

  agent: pdf_generator


mcp_runner_task:
  description: >
    Take the output from the previous task.

    Extract:
    - file_name
    - file_content

    Send this data to UiPath MCP.

    Do NOT expect any file path.
    Do NOT modify the data.

    Just forward the data as-is.

  expected_output: >
    Data successfully sent to UiPath MCP.

  context: [pdf_generator_task]

  agent: mcp_runner